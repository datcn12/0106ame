<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0106Ame</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 40%, #e1bee7 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ---- SCREEN 1: LOGIN ---- */
    #screen-login {
      text-align: center;
      padding: 48px 40px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid rgba(255, 182, 193, 0.6);
      box-shadow:
        0 0 30px rgba(236, 64, 122, 0.15),
        0 8px 32px rgba(0, 0, 0, 0.08);
      max-width: 420px;
      width: 90%;
      animation: fadeSlideUp 0.6s ease;
    }

    #screen-login .icon { font-size: 52px; margin-bottom: 16px; display: block; }

    #screen-login .question {
      font-size: 1.15rem;
      color: #ad1457;
      font-style: italic;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    #login-input {
      width: 100%;
      padding: 13px 20px;
      border: 2px solid #f48fb1;
      border-radius: 50px;
      font-size: 1.05rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      outline: none;
      color: #ad1457;
      margin-bottom: 18px;
      transition: border-color 0.25s, box-shadow 0.25s;
      letter-spacing: 0.1em;
    }

    #login-input:focus {
      border-color: #ec407a;
      box-shadow: 0 0 0 3px rgba(236, 64, 122, 0.15);
    }

    #login-btn {
      background: linear-gradient(135deg, #ec407a, #c2185b);
      color: #fff;
      border: none;
      padding: 13px 44px;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 18px rgba(236, 64, 122, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 22px rgba(236, 64, 122, 0.5);
    }

    #login-btn:active { transform: translateY(0); }

    #login-error {
      color: #b71c1c;
      font-size: 0.88rem;
      margin-top: 14px;
      min-height: 1.2em;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #login-error.visible { opacity: 1; }

    /* ---- SCREEN 2: ENVELOPE ---- */
    #screen-envelope {
      display: none;
      text-align: center;
      cursor: pointer;
      animation: fadeSlideUp 0.5s ease;
      user-select: none;
    }

    .envelope-emoji {
      font-size: 110px;
      display: block;
      animation: floatGlow 2.4s ease-in-out infinite;
      transition: transform 0.25s;
    }

    #screen-envelope:hover .envelope-emoji { transform: scale(1.08); }

    .envelope-hint {
      margin-top: 18px;
      color: #ad1457;
      font-size: 1rem;
      font-style: italic;
      letter-spacing: 0.04em;
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes floatGlow {
      0%, 100% {
        filter: drop-shadow(0 0 12px rgba(236, 64, 122, 0.5));
        transform: translateY(0);
      }
      50% {
        filter: drop-shadow(0 0 30px rgba(236, 64, 122, 0.85)) drop-shadow(0 0 55px rgba(255, 105, 180, 0.4));
        transform: translateY(-10px);
      }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* ---- SCREEN 3: LETTER ---- */
    #screen-letter {
      display: none;
      width: 100%;
      min-height: 100vh;
      align-items: flex-start;
      justify-content: center;
      padding: 52px 20px;
    }

    #screen-letter.active {
      display: flex;
      animation: fadeSlideUp 0.7s ease;
    }

    .letter-paper {
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 52px 44px;
      max-width: 580px;
      width: 100%;
      text-align: center;
      border: 1.5px solid rgba(255, 182, 193, 0.7);
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% {
        box-shadow:
          0 0 0 2px rgba(255, 182, 193, 0.5),
          0 0 22px 6px rgba(255, 105, 180, 0.45),
          0 0 60px 18px rgba(236, 64, 122, 0.15);
      }
      50% {
        box-shadow:
          0 0 0 2px rgba(255, 105, 180, 0.9),
          0 0 40px 12px rgba(236, 64, 122, 0.65),
          0 0 90px 28px rgba(236, 64, 122, 0.25);
      }
    }

    .letter-title {
      font-size: 1.45rem;
      color: #d81b60;
      font-style: italic;
      letter-spacing: 0.02em;
      margin-bottom: 36px;
      line-height: 1.4;
    }

    /* Photo + tulips */
    .photo-container {
      position: relative;
      display: inline-block;
      margin-bottom: 36px;
    }

    .photo-circle {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #f48fb1;
      box-shadow:
        0 0 0 4px rgba(255, 182, 193, 0.5),
        0 0 20px rgba(236, 64, 122, 0.35);
      display: block;
      position: relative;
      z-index: 1;
    }

    .tulip {
      position: absolute;
      font-size: 26px;
      pointer-events: none;
      /* centered on image */
      top: 50%;
      left: 50%;
      margin-top: -13px;
      margin-left: -13px;
      z-index: 0;
      animation-name: shootOut;
      animation-timing-function: cubic-bezier(0.2, 0.8, 0.4, 1);
      animation-iteration-count: infinite;
      animation-direction: normal;
      opacity: 0;
    }

    @keyframes shootOut {
      0% {
        transform: translate(0, 0) scale(0) rotate(0deg);
        opacity: 0.9;
      }
      70% {
        opacity: 0.85;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(1.1) rotate(var(--rot));
        opacity: 0;
      }
    }

    /* Letter text */
    .letter-content {
      font-size: 1rem;
      color: #4a1942;
      line-height: 1.9;
      text-align: center;
      white-space: pre-wrap;
      font-family: inherit;
    }

    .letter-date {
      text-align: right;
      margin-top: 24px;
      font-size: 0.88rem;
      color: #ad1457;
      font-style: italic;
      opacity: 0.75;
    }

    /* Shared */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- SCREEN 1 -->
<div id="screen-login">
  <span class="icon">🌷</span>
  <p class="question">Tôi thường gọi bà là gìiiii?</p>
  <input id="login-input" type="password" placeholder="..." autocomplete="off" />
  <br />
  <button id="login-btn" onclick="tryLogin()">Mở thư</button>
  <div id="login-error">Hmm, quên rồi chứ gì khọm già ~</div>
</div>

<!-- SCREEN 2 -->
<div id="screen-envelope" onclick="openLetter()">
  <span class="envelope-emoji">💌</span>
  <p class="envelope-hint">Nhấn để mở thư...</p>
</div>

<!-- SCREEN 3 -->
<div id="screen-letter">
  <div class="letter-paper">
    <h2 class="letter-title">Gửi em bé Ame của tui</h2>
    <div class="photo-container" id="photo-container">
      <img src="assets/photo.jpeg" alt="" class="photo-circle" />
    </div>
    <div class="letter-content" id="letter-content">Dang tai...</div>
    <div class="letter-date">01.06.2026</div>
  </div>
</div>

<script>
  const TULIP_EMOJIS = ['🍬', '🍭', '🍡', '🍫', '🍬', '🍭', '🍡', '🍫'];
  const TULIP_COUNT = 16;

  document.getElementById('login-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryLogin();
  });

  function tryLogin() {
    const val = document.getElementById('login-input').value.toLowerCase().trim();
    const err = document.getElementById('login-error');
    if (val === 'ame') {
      document.getElementById('screen-login').style.display = 'none';
      document.getElementById('screen-envelope').style.display = 'block';
    } else {
      document.getElementById('login-input').value = '';
      err.classList.add('visible');
      setTimeout(function() { err.classList.remove('visible'); }, 2600);
    }
  }

  function openLetter() {
    document.getElementById('screen-envelope').style.display = 'none';
    var ls = document.getElementById('screen-letter');
    ls.classList.add('active');
    spawnTulips();
    loadMessage();
  }

  function spawnTulips() {
    var container = document.getElementById('photo-container');
    for (var i = 0; i < TULIP_COUNT; i++) {
      var el = document.createElement('span');
      el.className = 'tulip';
      el.textContent = TULIP_EMOJIS[i % TULIP_EMOJIS.length];

      var angle = (i / TULIP_COUNT) * 2 * Math.PI + (Math.random() * 0.3);
      var dist = 130 + Math.random() * 90;
      var tx = Math.cos(angle) * dist;
      var ty = Math.sin(angle) * dist;
      var rot = -200 + Math.random() * 400;
      var duration = 1.3 + Math.random() * 1.0;
      var delay = (i / TULIP_COUNT) * 2.0;

      el.style.setProperty('--tx', tx + 'px');
      el.style.setProperty('--ty', ty + 'px');
      el.style.setProperty('--rot', rot + 'deg');
      el.style.animationDuration = duration.toFixed(2) + 's';
      el.style.animationDelay = delay.toFixed(2) + 's';

      container.appendChild(el);
    }
  }

  function loadMessage() {
    fetch('assets/message.txt')
      .then(function(r) { return r.text(); })
      .then(function(text) {
        document.getElementById('letter-content').textContent = text;
      })
      .catch(function() {
        document.getElementById('letter-content').textContent =
          '(Khong the tai noi dung thu - hay them file assets/message.txt)';
      });
  }
</script>
</body>
</html>
